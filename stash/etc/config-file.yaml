Clusters:
- Input:
    File:
      Paths:
        - /var/log/app/*.log
        - /var/log/nginx/access.log
      Format: plain
      Follow: true
      FromBeginning: false
  Ip2Region:
    Db: "/path/to/ip2region.xdb"
  Filters:
    - Action: ip2region
      Field: remote_addr
      Target: geo
    - Action: remove_field
      Fields:
        - message
  Output:
    MySQL:
      DSN: "user:password@tcp(127.0.0.1:3306)/stash"
      Table: "logs-{{yyyy-MM-dd}}"
      TimeZone: "Asia/Shanghai"
