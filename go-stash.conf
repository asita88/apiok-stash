[program:go-stash]
directory=/opt/go-stash
command=/opt/go-stash/go-stash -f /opt/go-stash/etc/config.yaml
autostart=true
autorestart=true
startsecs=3
startretries=10
stopwaitsecs=30
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/var/log/go-stash/stdout.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
priority=999
